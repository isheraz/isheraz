<svg width="512" height="512" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .accent { fill: #8ec052; }
    </style>
  </defs>

  <!-- Background (for favicon) -->
  <rect width="120" height="120" fill="#fafaf9" rx="20"/>

  <!-- Outer circle frame -->
  <circle cx="60" cy="60" r="58" stroke="#8ec052" strokeWidth="1.5" fill="none" opacity="0.3"/>

  <!-- Primary organic shape - upper curve -->
  <path class="accent" d="M 60 20 Q 75 30 78 45 Q 80 55 70 62 Q 60 68 50 65 Q 42 63 40 55 Q 38 48 45 42 Q 52 36 60 40"/>

  <!-- Primary organic shape - lower curve -->
  <path class="accent" d="M 60 100 Q 45 90 42 75 Q 40 65 50 58 Q 60 52 70 55 Q 78 57 80 65 Q 82 72 75 78 Q 68 84 60 80"/>

  <!-- Center connector -->
  <path class="accent" d="M 60 50 Q 62 58 60 65" stroke="#8ec052" strokeWidth="2.5" fill="none" strokeLinecap="round"/>

  <!-- Accent dots -->
  <circle cx="45" cy="40" r="2.5" class="accent" opacity="0.6"/>
  <circle cx="75" cy="80" r="2.5" class="accent" opacity="0.6"/>

  <!-- Background subtle geometric hint -->
  <circle cx="60" cy="60" r="35" fill="#8ec052" opacity="0.08"/>
</svg>
